# 柳小乐 Qwen3-VL-4B LoRA 训练配置 (LLaMA-Factory)
# 硬件: RTX 3080 16G，纯 LoRA 不量化

### 模型
model_name_or_path: /mnt/workspace/models/Qwen/Qwen3-VL-4B-Instruct
trust_remote_code: true

### 训练模式
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### 数据集
dataset: shayler_persona,shayler_single_turn,shayler_multi_turn,shayler_emotion
template: qwen3_vl
dataset_dir: /mnt/workspace/data/

### 输出
output_dir: /mnt/workspace/output/shayler_lora
logging_steps: 10
save_steps: 500
save_total_limit: 3

### LoRA 参数
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

### 训练参数
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### 显存优化
gradient_checkpointing: true
max_length: 512
packing: false
preprocessing_num_workers: 2
