# 阶段1: 基础角色训练（单轮+多轮+情绪）
# 硬件: A10 24G，纯 LoRA

### 模型
model_name_or_path: /mnt/workspace/models/Qwen/Qwen3-VL-4B-Instruct
trust_remote_code: true

### 训练模式
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### 数据集（不包括身份数据）
dataset: shayler_single_turn,shayler_multi_turn,shayler_emotion
template: qwen3_vl_nothink
dataset_dir: /mnt/workspace/LLaMA-Factory/data/
freeze_vision_tower: true

### 输出
output_dir: /mnt/workspace/output/shayler_stage1
logging_steps: 10
save_steps: 500
save_total_limit: 2

### LoRA 参数
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

### 训练参数
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 5.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### 显存
gradient_checkpointing: true
max_length: 768
packing: false
preprocessing_num_workers: 4
