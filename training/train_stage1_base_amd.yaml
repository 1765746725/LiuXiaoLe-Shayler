# 阶段1: 基础角色训练（单轮+多轮+情绪）
# 硬件: AMD 192G 显存，纯 LoRA

### 模型
model_name_or_path: /mnt/workspace/models/Qwen/Qwen3-VL-4B-Instruct
trust_remote_code: true
### 训练模式
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### 数据集（不包括身份数据）
dataset: shayler_single_turn,shayler_multi_turn,shayler_emotion
template: qwen3_vl_nothink
dataset_dir: /mnt/workspace/LLaMA-Factory/data/
freeze_vision_tower: true

### 输出
output_dir: /mnt/workspace/output/shayler_stage1
logging_steps: 10
save_steps: 500
save_total_limit: 2

### LoRA 参数
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

### 训练参数（192G 随便跑）
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
learning_rate: 5.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_steps: 50
fp16: true
ddp_timeout: 180000000

### 显存充裕，全放开
max_length: 2048
packing: false
preprocessing_num_workers: 8
