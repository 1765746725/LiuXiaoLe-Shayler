# 阶段2: 身份认知强化（仅身份数据，在阶段1基础上继续训练）
# 硬件: AMD 192G 显存，纯 LoRA

### 模型
model_name_or_path: /mnt/workspace/models/Qwen/Qwen3-VL-4B-Instruct
adapter_name_or_path: /mnt/workspace/output/shayler_stage1
trust_remote_code: true
### 训练模式
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### 数据集（仅身份数据）
dataset: shayler_persona
template: qwen3_vl_nothink
dataset_dir: /mnt/workspace/LLaMA-Factory/data/
freeze_vision_tower: true

### 输出
output_dir: /mnt/workspace/output/shayler_stage2
logging_steps: 5
save_steps: 100
save_total_limit: 2

### LoRA 参数（必须与阶段1一致）
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

### 训练参数
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
learning_rate: 1.0e-5
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_steps: 5
fp16: true
ddp_timeout: 180000000

### 显存充裕
max_length: 2048
packing: false
preprocessing_num_workers: 8
